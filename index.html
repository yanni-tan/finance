<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2ecef; --surface:#fff; --surface2:#f7f1f4; --sep:#ece5e9;
  --label:#1a1520; --label2:#6b5e66; --label3:#a89aa2;
  --accent:#e8388a; --green:#22c55e; --red:#ef4444;
  --green-bg:rgba(34,197,94,.1); --red-bg:rgba(239,68,68,.1);
  --radius:18px; --radius-sm:12px;
  --shadow:0 1px 2px rgba(16,24,40,.04),0 8px 28px rgba(16,24,40,.08);
}
[data-theme=dark]{
  --bg:#0b0709; --surface:#151013; --surface2:#1e181b; --sep:#261e21;
  --label:#f5f0f3; --label2:#9e8e96; --label3:#6a5d63;
  --accent:#f472b6; --shadow:0 1px 3px rgba(0,0,0,.5),0 10px 36px rgba(0,0,0,.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;font-weight:300;background:var(--bg);color:var(--label);-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── Layout ── */
.shell{display:flex;min-height:100vh}
.side{width:220px;background:var(--surface);border-right:1px solid var(--sep);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:20}
.main{margin-left:220px;flex:1;padding:32px 44px 80px}
@media(max-width:680px){.side{transform:translateX(-100%);transition:transform .25s}.side.open{transform:translateX(0)}.main{margin-left:0;padding:20px 18px 60px}}

/* ── Sidebar ── */
.brand{display:flex;align-items:center;gap:10px;padding:26px 18px 22px;border-bottom:1px solid var(--sep)}
.brand-mark{width:32px;height:32px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff}
.brand-name{font-size:14px;font-weight:500;color:var(--label)}
.nav{flex:1;padding:16px 10px;display:flex;flex-direction:column;gap:2px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;border:none;background:transparent;color:var(--label2);font-size:13.5px;font-weight:500;cursor:pointer;width:100%;text-align:left;font-family:inherit;transition:all .15s}
.nav-btn:hover{background:var(--surface2);color:var(--label)}
.nav-btn.active{background:var(--accent);color:#fff;font-weight:600}
.nav-icon{width:15px;flex-shrink:0}
.side-foot{padding:14px 10px 22px;border-top:1px solid var(--sep);display:flex;flex-direction:column;gap:6px}
.side-action{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.side-action:hover{opacity:.85}
.side-util{display:flex;gap:6px}
.util-btn{flex:1;padding:8px 6px;background:transparent;border:1px solid var(--sep);border-radius:var(--radius-sm);color:var(--label3);font-size:11.5px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.util-btn:hover{color:var(--label);border-color:var(--label3)}

/* ── Page ── */
.page{display:none}.page.active{display:block}
.ph{margin-bottom:28px}
.ph h1{font-size:32px;font-weight:300;letter-spacing:-1px;line-height:1.1}
.ph-sub{font-size:13px;color:var(--label3);margin-top:8px}

/* ── KPI row ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:var(--surface);border-radius:var(--radius);padding:22px 22px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi.accent{background:linear-gradient(140deg,#be185d,#f43f5e 55%,#fb923c)}
.kpi.green-card{background:linear-gradient(140deg,#16a34a,#4ade80)}
.kpi.plain{background:var(--surface)}
.kpi::after{content:"";position:absolute;top:-50%;right:-20%;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.25),transparent 70%);pointer-events:none}
.kpi>*{position:relative;z-index:1}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.kpi.accent .kpi-lbl,.kpi.green-card .kpi-lbl{color:rgba(255,255,255,.55)}
.kpi.plain .kpi-lbl{color:var(--label3)}
.kpi-val{font-size:32px;font-weight:300;letter-spacing:-1.2px;line-height:1}
.kpi.accent .kpi-val,.kpi.green-card .kpi-val{color:#fff}
.kpi-sub{font-size:11px;margin-top:8px}
.kpi.accent .kpi-sub,.kpi.green-card .kpi-sub{color:rgba(255,255,255,.5)}
.kpi.plain .kpi-sub{color:var(--label3)}
.delta{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;margin-top:8px}
.delta.pos{background:var(--green-bg);color:var(--green)}
.delta.neg{background:var(--red-bg);color:var(--red)}
.delta.none{background:var(--surface2);color:var(--label3)}

/* ── Cards ── */
.grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;align-items:start;margin-bottom:18px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--sep);gap:12px}
.card-hdr h2{font-size:14px;font-weight:600}
.card-body{padding:20px}
.card-hdr-right{display:flex;align-items:center;gap:8px}

/* ── Formula breakdown ── */
.formula-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--sep);font-size:13px}
.formula-row:last-child{border-bottom:none}
.formula-row.total{font-size:15px;font-weight:700;padding-top:14px;margin-top:4px;border-top:2px solid var(--sep);border-bottom:none}
.formula-row.sub .formula-name{font-size:12px;color:var(--label3);padding-left:14px}
.formula-name{color:var(--label2)}
.formula-val{font-weight:600}

/* ── Goal bar ── */
.goal-bar-wrap{margin:14px 0 8px}
.goal-bar-track{width:100%;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden}
.goal-bar-fill{height:100%;border-radius:5px;transition:width .4s;background:linear-gradient(90deg,#4ade80,#86efac)}
.goal-bar-fill.behind{background:linear-gradient(90deg,#f97316,#fb923c)}
.goal-bar-fill.done{background:linear-gradient(90deg,#16a34a,#22c55e)}
.goal-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--label3)}

/* ── History table ── */
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--label3);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--sep)}
th.r,td.r{text-align:right}
tbody tr{border-bottom:1px solid var(--sep);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:11px 14px;vertical-align:middle}
.row-acts{display:flex;gap:4px;opacity:0;transition:opacity .15s;justify-content:flex-end}
tbody tr:hover .row-acts{opacity:1}
.row-btn{padding:3px 9px;font-size:11px;font-weight:500;border-radius:6px;border:1px solid var(--sep);background:var(--surface);color:var(--label2);cursor:pointer;transition:all .1s;font-family:inherit}
.row-btn:hover{color:var(--label);border-color:var(--label3)}
.row-btn.del:hover{color:var(--red);border-color:var(--red);background:var(--red-bg)}

/* ── Bills list ── */
.bill-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--sep)}
.bill-row:last-child{border-bottom:none}
.bill-name{flex:1;font-size:13px;font-weight:500}
.bill-amt{font-size:14px;font-weight:600;color:var(--red)}
.bill-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.bill-row:hover .bill-actions{opacity:1}

/* ── Empty ── */
.empty{text-align:center;padding:50px 20px}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.3}
.empty h3{font-size:15px;font-weight:600;margin-bottom:5px}
.empty p{font-size:12.5px;color:var(--label3);margin-bottom:18px}

/* ── Modal ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px;padding:26px;width:100%;max-width:420px;margin:18px;box-shadow:0 24px 80px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-hdr h2{font-size:17px;font-weight:700;letter-spacing:-.3px}
.modal-x{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:none;cursor:pointer;font-size:17px;color:var(--label2);line-height:1;display:flex;align-items:center;justify-content:center}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:10.5px;font-weight:700;color:var(--label2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.finput,.fselect{width:100%;padding:10px 12px;background:var(--surface2);border:1.5px solid var(--sep);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--label);outline:none;transition:border-color .15s}
.finput:focus,.fselect:focus{border-color:var(--accent)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-acts{display:flex;gap:9px;margin-top:18px}
.btn{padding:11px 16px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#fff;flex:1}
.btn-ghost{background:transparent;color:var(--label2);border:1.5px solid var(--sep)}
.sec-label{font-size:10px;font-weight:700;color:var(--label3);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px}

/* ── Misc ── */
.pos{color:var(--green)}.neg{color:var(--red)}
.chip{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:700}
.chip.green{background:var(--green-bg);color:var(--green)}
.chip.red{background:var(--red-bg);color:var(--red)}
.chip.grey{background:var(--surface2);color:var(--label3)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:#111;color:#fff;padding:11px 20px;border-radius:11px;font-size:12.5px;font-weight:500;box-shadow:0 6px 24px rgba(0,0,0,.35);opacity:0;transition:transform .22s,opacity .22s;z-index:200;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.menu-btn{display:none;width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--sep);cursor:pointer;align-items:center;justify-content:center}
.menu-btn svg{width:14px;height:14px;stroke:var(--label2);stroke-width:2;fill:none;stroke-linecap:round}
@media(max-width:680px){.menu-btn{display:flex}}
</style>
</head>
<body data-theme="dark">
<div class="shell">

<!-- ── Sidebar ── -->
<aside class="side" id="side">
  <div class="brand">
    <div class="brand-mark">$</div>
    <span class="brand-name">Finance</span>
  </div>
  <nav class="nav">
    <button class="nav-btn active" data-page="dashboard">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="nav-btn" data-page="history">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
      Savings log
    </button>
  </nav>
  <div class="side-foot">
    <button class="side-action" id="logBtn">+ Log savings</button>
    <div class="side-util">
      <button class="util-btn" id="themeBtn">Theme</button>
      <button class="util-btn" id="settingsBtn">Settings</button>
    </div>
  </div>
</aside>

<!-- ── Main ── -->
<main class="main">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px">
    <div>
      <h1 id="ph" style="font-size:32px;font-weight:300;letter-spacing:-1px"></h1>
      <div id="ph-sub" style="font-size:13px;color:var(--label3);margin-top:6px"></div>
    </div>
    <button class="menu-btn" id="menuBtn"><svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
  </div>

  <!-- Dashboard -->
  <section class="page active" id="page-dashboard">
    <div class="kpi-row">
      <div class="kpi accent">
        <div class="kpi-lbl">Current savings</div>
        <div class="kpi-val" id="kSavings">—</div>
        <div id="kSavingsDelta"></div>
        <div class="kpi-sub" id="kSavingsSub">Log your balance to start tracking</div>
      </div>
      <div class="kpi green-card">
        <div class="kpi-lbl">Saved this month</div>
        <div class="kpi-val" id="kSaved">—</div>
        <div class="kpi-sub" id="kSavedSub">vs your goal</div>
      </div>
      <div class="kpi plain">
        <div class="kpi-lbl">Spendable</div>
        <div class="kpi-val" id="kSpendable" style="font-size:28px">—</div>
        <div class="kpi-sub" id="kSpendableSub">After bills &amp; savings goal</div>
      </div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="card-hdr">
          <h2>Spendable breakdown</h2>
          <div class="card-hdr-right"><button class="row-btn" onclick="openSettings()">Edit →</button></div>
        </div>
        <div class="card-body" id="formulaBody"></div>
      </div>
      <div class="card">
        <div class="card-hdr">
          <h2>Savings goal</h2>
          <div class="card-hdr-right">
            <div id="goalBadge" style="display:inline"></div>
            <button class="row-btn" onclick="openSettings()">Edit →</button>
          </div>
        </div>
        <div class="card-body" id="goalBody"></div>
      </div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="card-hdr">
          <h2>Monthly bills</h2>
          <div class="card-hdr-right">
            <span id="billTotal" style="font-size:13px;font-weight:700;color:var(--red)"></span>
            <button class="row-btn" onclick="openBillModal()">+ Add</button>
          </div>
        </div>
        <div class="card-body" id="billList"></div>
      </div>
      <div class="card">
        <div class="card-hdr"><h2>Bill summary</h2></div>
        <div class="card-body" id="billSummary"></div>
      </div>
    </div>
  </section>

  <!-- History -->
  <section class="page" id="page-history">
    <div style="display:flex;justify-content:flex-end;margin-bottom:18px">
      <button class="btn btn-primary" onclick="openLog()" style="flex:0">+ Log savings</button>
    </div>
    <div class="card">
      <div class="card-hdr"><h2>Monthly savings log</h2><span id="histCount" style="font-size:12px;color:var(--label3)"></span></div>
      <div id="histBody"></div>
    </div>
  </section>
</main>
</div>

<!-- ── Log savings modal ── -->
<div class="overlay" id="logModal">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="logTitle">Log savings</h2>
      <button class="modal-x" onclick="closeModal('logModal')">×</button>
    </div>
    <div class="fg">
      <label>Month</label>
      <input type="month" class="finput" id="logMonth">
    </div>
    <div class="fg">
      <label>Current bank savings balance</label>
      <input type="number" class="finput" id="logBalance" placeholder="0.00" step="0.01" min="0">
    </div>
    <div class="modal-acts">
      <button class="btn btn-ghost" onclick="closeModal('logModal')">Cancel</button>
      <button class="btn btn-primary" id="logSaveBtn" onclick="saveLog()">Save</button>
    </div>
  </div>
</div>

<!-- ── Bill modal ── -->
<div class="overlay" id="billModal">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="billModalTitle">Add bill</h2>
      <button class="modal-x" onclick="closeModal('billModal')">×</button>
    </div>
    <div class="fg">
      <label>Bill name</label>
      <input type="text" class="finput" id="billName" placeholder="e.g. Rent, Netflix, Phone">
    </div>
    <div class="fg">
      <label>Monthly amount</label>
      <input type="number" class="finput" id="billAmt" placeholder="0.00" step="0.01" min="0">
    </div>
    <div class="modal-acts">
      <button class="btn btn-ghost" onclick="closeModal('billModal')">Cancel</button>
      <button class="btn btn-primary" id="billSaveBtn" onclick="saveBill()">Save</button>
    </div>
  </div>
</div>

<!-- ── Settings modal ── -->
<div class="overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-hdr">
      <h2>Settings</h2>
      <button class="modal-x" onclick="closeModal('settingsModal')">×</button>
    </div>
    <div class="fg">
      <label>Currency</label>
      <select class="fselect" id="setCurrency">
        <option value="SGD">SGD</option><option value="USD">USD</option>
        <option value="AUD">AUD</option><option value="GBP">GBP</option>
        <option value="EUR">EUR</option><option value="MYR">MYR</option>
        <option value="HKD">HKD</option><option value="JPY">JPY</option>
      </select>
    </div>
    <div class="fg">
      <label>Gross salary (before CPF)</label>
      <input type="number" class="finput" id="setGrossSalary" placeholder="0.00" step="0.01" min="0" oninput="updateTakeHome()">
    </div>
    <div class="fg">
      <label>Take-home after CPF <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--label3)">(20% employee contribution)</span></label>
      <div style="padding:10px 12px;background:var(--surface2);border:1.5px solid var(--sep);border-radius:var(--radius-sm);font-size:14px;color:var(--label3)" id="takeHomePreview">—</div>
    </div>
    <div class="fg">
      <label>Monthly savings goal</label>
      <input type="number" class="finput" id="setGoal" placeholder="e.g. 500" step="0.01" min="0">
    </div>
    <div class="modal-acts">
      <button class="btn btn-ghost" onclick="closeModal('settingsModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none">
<div class="toast" id="toast"></div>

<script>
// ── State ──
const KEY = 'finance_v2';
const DEF = {
  settings: { currency: 'SGD', theme: 'dark', grossSalary: 0, salary: 0, savingsGoal: 0 },
  savings: [],   // [{month:'YYYY-MM', balance:0}]
  bills: []      // [{id, name, amount}]
};

let data = load();
let billEditId = null;
let logEditMonth = null;

function load() {
  try {
    const r = localStorage.getItem(KEY);
    if (!r) return clone(DEF);
    const p = JSON.parse(r);
    return { ...clone(DEF), ...p, settings: { ...DEF.settings, ...(p.settings||{}) } };
  } catch { return clone(DEF); }
}
function save() { localStorage.setItem(KEY, JSON.stringify(data)); }
function clone(x) { return JSON.parse(JSON.stringify(x)); }
function uid() { return Math.random().toString(36).slice(2,10); }

// ── Format ──
function fmt(n, decimals=0) {
  return new Intl.NumberFormat('en-US',{style:'currency',currency:data.settings.currency||'SGD',minimumFractionDigits:decimals,maximumFractionDigits:decimals}).format(n);
}
function fmtMonth(key) {
  const [y,m] = key.split('-').map(Number);
  return new Date(y, m-1, 1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
}
function thisMonth() { return new Date().toISOString().slice(0,7); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}
function esc(s) { return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ── Derived ──
function sortedSavings() { return [...data.savings].sort((a,b)=>a.month.localeCompare(b.month)); }
function latestSavings() { const s=sortedSavings(); return s.length ? s[s.length-1] : null; }
function prevSavings() { const s=sortedSavings(); return s.length>=2 ? s[s.length-2] : null; }
function totalBills() { return data.bills.reduce((s,b)=>s+Number(b.amount||0), 0); }
function spendable() {
  const s = data.settings;
  return Number(s.salary||0) - totalBills() - Number(s.savingsGoal||0);
}
function savedThisMonth() {
  const cur = latestSavings(), prev = prevSavings();
  if (!cur) return null;
  if (!prev) return null;
  return cur.balance - prev.balance;
}

// ── Render: Dashboard ──
function renderDashboard() {
  const hour = new Date().getHours();
  const greet = hour<5?'Good night.':hour<12?'Good morning.':hour<18?'Good afternoon.':'Good evening.';
  document.getElementById('ph').textContent = greet;
  document.getElementById('ph-sub').textContent = 'Your financial snapshot.';

  const cur = latestSavings();
  const prev = prevSavings();
  const delta = savedThisMonth();
  const goal = Number(data.settings.savingsGoal||0);
  const sp = spendable();

  // Current savings KPI
  document.getElementById('kSavings').textContent = cur ? fmt(cur.balance) : '—';
  document.getElementById('kSavingsSub').textContent = cur ? `as of ${fmtMonth(cur.month)}` : 'Log your balance to start tracking';
  if (delta !== null) {
    const sign = delta >= 0 ? '+' : '';
    const cls = delta >= 0 ? 'pos' : 'neg';
    document.getElementById('kSavingsDelta').innerHTML = `<div class="delta ${delta>=0?'pos':'neg'}">${sign}${fmt(delta)} this month</div>`;
  } else {
    document.getElementById('kSavingsDelta').innerHTML = '';
  }

  // Saved this month KPI
  if (delta !== null) {
    document.getElementById('kSaved').textContent = fmt(delta);
    document.getElementById('kSaved').className = 'kpi-val ' + (delta >= 0 ? '' : 'neg');
    if (goal > 0) {
      const pct = Math.round((delta / goal) * 100);
      document.getElementById('kSavedSub').textContent = `${pct}% of ${fmt(goal)} goal`;
    } else {
      document.getElementById('kSavedSub').textContent = 'Set a goal in Settings';
    }
  } else if (cur) {
    document.getElementById('kSaved').textContent = '—';
    document.getElementById('kSavedSub').textContent = 'Log next month to compare';
  } else {
    document.getElementById('kSaved').textContent = '—';
    document.getElementById('kSavedSub').textContent = 'vs your goal';
  }

  // Spendable KPI
  if (Number(data.settings.salary||0) > 0) {
    document.getElementById('kSpendable').textContent = fmt(sp);
    document.getElementById('kSpendable').style.color = sp >= 0 ? '' : 'var(--red)';
    document.getElementById('kSpendableSub').textContent = sp >= 0 ? 'After bills & savings goal' : 'Bills + goal exceed salary';
  } else {
    document.getElementById('kSpendable').textContent = '—';
    document.getElementById('kSpendable').style.color = '';
    document.getElementById('kSpendableSub').textContent = 'Set salary in Settings';
  }

  // Formula breakdown
  renderFormula();

  // Goal card
  renderGoalCard();
}

function renderFormula() {
  const s = data.settings;
  const salary = Number(s.salary||0);
  const goal = Number(s.savingsGoal||0);
  const bills = data.bills;
  const billsTotal = totalBills();
  const sp = spendable();

  if (salary === 0 && bills.length === 0 && goal === 0) {
    document.getElementById('formulaBody').innerHTML = `<div class="empty" style="padding:30px 16px"><div class="empty-icon">⚙️</div><h3>Not set up yet</h3><p>Add your salary, bills, and savings goal.</p><button class="btn btn-primary" onclick="openSettings()" style="flex:0;display:inline-block">Set up →</button></div>`;
    return;
  }

  let rows = `<div class="formula-row"><span class="formula-name">Take-home salary</span><span class="formula-val pos">${fmt(salary)}</span></div>`;
  if (bills.length > 0) {
    rows += `<div class="formula-row"><span class="formula-name">− Total bills</span><span class="formula-val neg">−${fmt(billsTotal)}</span></div>`;
    bills.forEach(b => {
      rows += `<div class="formula-row sub"><span class="formula-name">${esc(b.name)}</span><span class="formula-val" style="color:var(--label3);font-size:12px">−${fmt(Number(b.amount))}</span></div>`;
    });
  }
  if (goal > 0) {
    rows += `<div class="formula-row"><span class="formula-name">− Savings goal</span><span class="formula-val neg">−${fmt(goal)}</span></div>`;
  }
  rows += `<div class="formula-row total"><span>= Spendable</span><span class="${sp>=0?'pos':'neg'}">${fmt(sp)}</span></div>`;
  document.getElementById('formulaBody').innerHTML = rows;
}

function renderGoalCard() {
  const goal = Number(data.settings.savingsGoal||0);
  const delta = savedThisMonth();
  const cur = latestSavings();
  const goalEl = document.getElementById('goalBody');
  const badgeEl = document.getElementById('goalBadge');

  if (goal === 0) {
    badgeEl.innerHTML = '';
    goalEl.innerHTML = `<div class="empty" style="padding:24px 16px"><div class="empty-icon">🎯</div><h3>No goal set</h3><p>Set a monthly savings goal in Settings to track your progress.</p><button class="btn btn-primary" onclick="openSettings()" style="flex:0;display:inline-block">Set goal →</button></div>`;
    return;
  }

  if (delta === null) {
    badgeEl.innerHTML = '';
    goalEl.innerHTML = `<div style="font-size:13px;color:var(--label2);padding:8px 0">Target: <b>${fmt(goal)}/month</b><br><br><span style="color:var(--label3);font-size:12px">Log two months to see progress.</span></div>`;
    return;
  }

  const pct = Math.min(100, Math.max(0, (delta / goal) * 100));
  const onTrack = delta >= goal;
  const behind = delta < 0;
  const cls = behind ? 'behind' : onTrack ? 'done' : '';
  badgeEl.innerHTML = `<span class="chip ${onTrack?'green':behind?'red':'grey'}">${onTrack?'On track':behind?'Deficit':'Behind'}</span>`;

  goalEl.innerHTML = `
    <div style="font-size:28px;font-weight:300;letter-spacing:-1px;margin-bottom:4px;color:${behind?'var(--red)':onTrack?'var(--green)':'var(--label)'}">${(delta>=0?'+':'')}${fmt(delta)}</div>
    <div style="font-size:12px;color:var(--label3);margin-bottom:14px">saved · target ${fmt(goal)}</div>
    <div class="goal-bar-wrap">
      <div class="goal-bar-track"><div class="goal-bar-fill ${cls}" style="width:${pct}%"></div></div>
    </div>
    <div class="goal-meta"><span>${pct.toFixed(0)}% of goal</span><span>${onTrack ? fmt(delta-goal)+' over' : fmt(goal-delta)+' to go'}</span></div>`;
}

// ── Render: History ──
function renderHistory() {
  const entries = sortedSavings().reverse();
  document.getElementById('histCount').textContent = `${entries.length} entr${entries.length===1?'y':'ies'}`;
  if (entries.length === 0) {
    document.getElementById('histBody').innerHTML = `<div class="empty"><div class="empty-icon">📅</div><h3>No entries yet</h3><p>Log your savings balance each month to build a history.</p></div>`;
    return;
  }
  // compute deltas
  const sorted = sortedSavings();
  const deltaMap = {};
  sorted.forEach((e, i) => {
    deltaMap[e.month] = i > 0 ? e.balance - sorted[i-1].balance : null;
  });

  const rows = entries.map(e => {
    const d = deltaMap[e.month];
    const deltaCell = d !== null
      ? `<span class="${d>=0?'pos':'neg'}">${d>=0?'+':''}${fmt(d)}</span>`
      : `<span style="color:var(--label3)">—</span>`;
    return `<tr>
      <td style="font-weight:500">${fmtMonth(e.month)}</td>
      <td class="r" style="font-weight:600">${fmt(e.balance)}</td>
      <td class="r">${deltaCell}</td>
      <td class="r"><div class="row-acts">
        <button class="row-btn" onclick="editLog('${e.month}')">Edit</button>
        <button class="row-btn del" onclick="deleteLog('${e.month}')">Delete</button>
      </div></td>
    </tr>`;
  }).join('');
  document.getElementById('histBody').innerHTML = `<table><thead><tr><th>Month</th><th class="r">Balance</th><th class="r">Saved</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ── Render: Bills ──
function renderBills() {
  const bills = data.bills;
  const total = totalBills();
  document.getElementById('billTotal').textContent = bills.length ? `Total: ${fmt(total)}/mo` : '';

  if (bills.length === 0) {
    document.getElementById('billList').innerHTML = `<div class="empty"><div class="empty-icon">📄</div><h3>No bills added</h3><p>Add your regular monthly expenses — rent, subscriptions, utilities.</p></div>`;
  } else {
    document.getElementById('billList').innerHTML = bills.map(b => `
      <div class="bill-row">
        <span class="bill-name">${esc(b.name)}</span>
        <span class="bill-amt">−${fmt(Number(b.amount))}</span>
        <div class="bill-actions">
          <button class="row-btn" onclick="editBill('${b.id}')">Edit</button>
          <button class="row-btn del" onclick="deleteBill('${b.id}')">Delete</button>
        </div>
      </div>`).join('');
  }

  // Summary
  const salary = Number(data.settings.salary||0);
  const goal = Number(data.settings.savingsGoal||0);
  const sp = spendable();
  let summaryHTML = '';
  if (salary > 0) {
    summaryHTML = `
      <div class="formula-row"><span class="formula-name">Salary</span><span class="formula-val pos">${fmt(salary)}</span></div>
      <div class="formula-row"><span class="formula-name">Bills</span><span class="formula-val neg">−${fmt(total)}</span></div>
      ${goal>0?`<div class="formula-row"><span class="formula-name">Savings goal</span><span class="formula-val neg">−${fmt(goal)}</span></div>`:''}
      <div class="formula-row total"><span>Spendable</span><span class="${sp>=0?'pos':'neg'}">${fmt(sp)}</span></div>`;
  } else {
    summaryHTML = `<div style="font-size:12.5px;color:var(--label3)">Set your salary in Settings to see the full breakdown.</div>`;
  }
  document.getElementById('billSummary').innerHTML = summaryHTML;
}

function renderAll() {
  renderDashboard();
  renderHistory();
  renderBills();
}

// ── Log savings ──
function openLog() {
  logEditMonth = null;
  document.getElementById('logTitle').textContent = 'Log savings';
  document.getElementById('logSaveBtn').textContent = 'Save';
  document.getElementById('logMonth').value = thisMonth();
  document.getElementById('logBalance').value = '';
  document.getElementById('logModal').classList.add('open');
  setTimeout(()=>document.getElementById('logBalance').focus(), 80);
}
function editLog(month) {
  const e = data.savings.find(s=>s.month===month);
  if (!e) return;
  logEditMonth = month;
  document.getElementById('logTitle').textContent = 'Edit entry';
  document.getElementById('logSaveBtn').textContent = 'Save changes';
  document.getElementById('logMonth').value = month;
  document.getElementById('logBalance').value = e.balance;
  document.getElementById('logModal').classList.add('open');
}
function saveLog() {
  const month = document.getElementById('logMonth').value;
  const balance = parseFloat(document.getElementById('logBalance').value);
  if (!month) { toast('Pick a month'); return; }
  if (isNaN(balance) || balance < 0) { toast('Enter a valid balance'); return; }
  const existing = data.savings.findIndex(s=>s.month===month);
  if (existing >= 0) data.savings[existing].balance = balance;
  else data.savings.push({ month, balance });
  save(); closeModal('logModal'); toast('Saved'); renderAll();
}
function deleteLog(month) {
  if (!confirm('Delete this entry?')) return;
  data.savings = data.savings.filter(s=>s.month!==month);
  save(); toast('Deleted'); renderAll();
}

// ── Bills ──
function openBillModal() {
  billEditId = null;
  document.getElementById('billModalTitle').textContent = 'Add bill';
  document.getElementById('billSaveBtn').textContent = 'Add bill';
  document.getElementById('billName').value = '';
  document.getElementById('billAmt').value = '';
  document.getElementById('billModal').classList.add('open');
  setTimeout(()=>document.getElementById('billName').focus(), 80);
}
function editBill(id) {
  const b = data.bills.find(x=>x.id===id);
  if (!b) return;
  billEditId = id;
  document.getElementById('billModalTitle').textContent = 'Edit bill';
  document.getElementById('billSaveBtn').textContent = 'Save changes';
  document.getElementById('billName').value = b.name;
  document.getElementById('billAmt').value = b.amount;
  document.getElementById('billModal').classList.add('open');
}
function saveBill() {
  const name = document.getElementById('billName').value.trim();
  const amount = parseFloat(document.getElementById('billAmt').value);
  if (!name) { toast('Enter a name'); return; }
  if (isNaN(amount) || amount < 0) { toast('Enter a valid amount'); return; }
  if (billEditId) {
    const idx = data.bills.findIndex(x=>x.id===billEditId);
    data.bills[idx] = { ...data.bills[idx], name, amount };
  } else {
    data.bills.push({ id: uid(), name, amount });
  }
  billEditId = null;
  save(); closeModal('billModal'); toast(billEditId?'Updated':'Added'); renderAll();
}
function deleteBill(id) {
  if (!confirm('Remove this bill?')) return;
  data.bills = data.bills.filter(x=>x.id!==id);
  save(); toast('Removed'); renderAll();
}

// ── Settings ──
function updateTakeHome() {
  const gross = parseFloat(document.getElementById('setGrossSalary').value) || 0;
  const takeHome = gross * 0.8;
  const cur = document.getElementById('setCurrency').value || data.settings.currency || 'SGD';
  const formatted = gross > 0
    ? new Intl.NumberFormat('en-US',{style:'currency',currency:cur,minimumFractionDigits:0,maximumFractionDigits:0}).format(takeHome)
    : '—';
  document.getElementById('takeHomePreview').textContent = formatted;
  document.getElementById('takeHomePreview').style.color = gross > 0 ? 'var(--green)' : 'var(--label3)';
}
function openSettings() {
  document.getElementById('setCurrency').value = data.settings.currency||'SGD';
  document.getElementById('setGrossSalary').value = data.settings.grossSalary||'';
  document.getElementById('setGoal').value = data.settings.savingsGoal||'';
  updateTakeHome();
  document.getElementById('settingsModal').classList.add('open');
}
function saveSettings() {
  data.settings.currency = document.getElementById('setCurrency').value;
  data.settings.grossSalary = parseFloat(document.getElementById('setGrossSalary').value)||0;
  data.settings.salary = Math.round(data.settings.grossSalary * 0.8 * 100) / 100;
  data.settings.savingsGoal = parseFloat(document.getElementById('setGoal').value)||0;
  save(); closeModal('settingsModal'); toast('Settings saved'); renderAll();
}

// ── Nav / theme / modals ──
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.page===page));
  document.getElementById('logBtn').textContent = '+ Log savings';
  document.getElementById('logBtn').onclick = openLog;
  document.getElementById('side').classList.remove('open');
  renderAll();
}
function toggleTheme() {
  const next = document.body.dataset.theme==='dark' ? 'light' : 'dark';
  document.body.dataset.theme = next;
  data.settings.theme = next;
  save();
}

// ── Wire-up ──
document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>switchPage(b.dataset.page)));
document.getElementById('logBtn').addEventListener('click', openLog);
document.getElementById('themeBtn').addEventListener('click', toggleTheme);
document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('menuBtn').addEventListener('click', ()=>document.getElementById('side').classList.toggle('open'));
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'))});

document.body.dataset.theme = data.settings.theme || 'dark';
renderAll();
</script>
</body>
</html>
